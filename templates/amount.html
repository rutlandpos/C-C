{% extends "base.html" %}
{% block title %}Amount{% endblock %}
{% block content %}
<p class="protocol-mode-back">
  <a class="text-link" href="{{ url_for('protocol_select') }}">← Protocols</a>
</p>
<h2>Transaction Amount</h2>
<form
  method="POST"
  action="{{ url_for('amount') }}"
  class="form-wrap"
  novalidate
>
  <label for="amountInput">Amount (USD)</label>
  <input
    id="amountInput"
    name="amount"
    inputmode="decimal"
    pattern="^\d+(\.\d{1,2})?$"
    required
    autocomplete="off"
    maxlength="12"
    placeholder="0.00"
  />
  <small id="amtWarn" style="color: var(--color-danger); display: none"></small>
  <button type="submit" id="amountNext">Continue</button>
</form>

<script>
  const amountInput = document.getElementById("amountInput");
  const amtWarn = document.getElementById("amtWarn");
  const amountNext = document.getElementById("amountNext");

  const MIN = 10;
  const MAX = 50000000;

  amountInput.addEventListener("input", () => {
    let v = amountInput.value.replace(/[^\d.]/g, "");
    const parts = v.split(".");
    if (parts.length > 2) {
      v = parts[0] + "." + parts.slice(1).join("");
    }
    if (parts[1]) {
      parts[1] = parts[1].slice(0, 2);
      v = parts[0] + "." + parts[1];
    }
    if (v.length > 1 && v[0] === "0" && v[1] !== ".") {
      v = v.replace(/^0+/, "") || "0";
    }
    amountInput.value = v;

    const num = parseFloat(v);
    if (!isNaN(num) && num > MAX) {
      amtWarn.style.display = "block";
      amtWarn.innerText = `Amount must be ≤ ${MAX.toLocaleString()}`;
      amountNext.disabled = true;
    } else if (v === "" || v === "." || isNaN(num)) {
      amtWarn.style.display = "block";
      amtWarn.innerText = "Enter a valid number.";
      amountNext.disabled = true;
    } else {
      amtWarn.style.display = "none";
      amountNext.disabled = false;
    }
  });

  document.querySelector("form").addEventListener("submit", function (e) {
    const num = parseInt(amountInput.value, 10);
    if (isNaN(num) || num < MIN || num > MAX) {
      e.preventDefault();
      amtWarn.style.display = "block";
      amtWarn.innerText = "Min: 10 | Max: 50,000,000";
    }
  });
</script>
{% endblock %}
