<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}NJAKAM LIMITED{% endblock %} · Terminal</title>
    <link
      rel="manifest"
      href="{{ url_for('static', filename='manifest.json') }}"
    />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
      sizes="any"
      type="image/x-icon"
    />
    <link
      rel="apple-touch-icon"
      href="{{ url_for('static', filename='icons/icon-192x192.png') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    {% block head_extra %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <header class="app-header">
      <a
        href="{{ url_for('dashboard') if session.get('logged_in') else url_for('login') }}"
        class="app-brand"
      >
        <img
          src="{{ url_for('static', filename='logo.png') }}"
          alt=""
          class="app-brand__mark"
          width="40"
          height="40"
          decoding="async"
        />
        <span class="app-brand__text">
          <span class="app-brand__name">NJAKAM LIMITED</span>
          <span class="app-brand__tag">Point of sale</span>
        </span>
      </a>
    </header>

    <main class="container{% block container_extra %}{% endblock %}">
      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="flash" role="alert">
        {% for msg in messages %}
        <p>{{ msg }}</p>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then((reg) => console.log("Service worker registered", reg))
          .catch((err) => console.error("Service worker failed:", err));
      }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
