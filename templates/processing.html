<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processing · {{ terminal_company_name }}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <meta name="theme-color" content="#0f766e" />
    <meta http-equiv="refresh" content="7;url={{ url_for('success') }}" />
  </head>
  <body class="page-processing{% if offline %} offline-mode{% endif %}">
    <div class="processing-inner">
      <div class="spinner" role="status" aria-label="Processing"></div>
      <h2>{% if offline %}Offline capture{% else %}Processing transaction{% endif %}</h2>
      <p id="status">Please wait…</p>
    </div>

    <script>
      const offline = {{ offline|tojson }};
      const steps = offline
        ? [
            "Queueing offline batch…",
            "Applying store-and-forward rules…",
            "Sealing transaction payload…",
            "Preparing receipt…",
          ]
        : [
            "Connecting to issuer…",
            "Validating card…",
            "Authorizing transaction…",
            "Generating receipt…",
          ];
      let i = 0;
      const el = document.getElementById("status");
      setInterval(() => {
        if (i < steps.length) el.textContent = steps[i++];
      }, 1500);
    </script>
  </body>
</html>
