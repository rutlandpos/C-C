{% extends "base.html" %}
{% block title %}Securing…{% endblock %}
{% block content %}
<div class="decrypting-panel">
  <h2>Securing session</h2>
  <p class="login-lead" style="margin-bottom: 1rem">
    Packaging your transaction for the host. This only takes a moment.
  </p>
  <pre id="binary" aria-hidden="true"></pre>
</div>

<script>
  const bin = document.getElementById("binary");
  function randomBinary(len) {
    return Array.from({ length: len }, () => (Math.random() > 0.5 ? "1" : "0")).join("");
  }
  let i = 0;
  const interval = setInterval(() => {
    bin.textContent += randomBinary(48) + "\n";
    if (++i > 24) bin.textContent = "";
  }, 180);

  setTimeout(() => {
    clearInterval(interval);
    window.location.href = "{{ url_for('processing') }}";
  }, 5000);
</script>
{% endblock %}
